<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBKR Risk Monitor</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React (UMD) -->
    <script src="https://unpkg.com/lucide-react@0.380.0/dist/umd/lucide-react.js"></script>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Robust icon handling
        const Lucide = window.lucideReact || window.LucideReact || {};
        const IconProxy = new Proxy(Lucide, {
            get: (target, prop) => {
                if (target[prop]) return target[prop];
                // Fallback icon component
                return (props) => (
                    <div className={props.className || "w-4 h-4"}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="12" cy="12" r="10" />
                        </svg>
                    </div>
                );
            }
        });

        const {
            Shield, Activity, TrendingUp, ShieldCheck, Settings, RefreshCcw,
            Power, Info, ArrowUpRight, ArrowDownRight, Wallet, Zap,
            Cpu, BarChart3, ChevronDown, AlertOctagon, Network, Circle, Database, Radio,
            Eye, EyeOff
        } = IconProxy;

        // Custom Inline Icons for reliable rendering
        const SvgWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-4 h-4"}>{children}</svg>
        );
        const RawDatabaseIcon = (p) => <SvgWrapper {...p}><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5V19A9 3 0 0 0 21 19V5" /><path d="M3 12A9 3 0 0 0 21 12" /></SvgWrapper>;
        const RawWalletIcon = (p) => <SvgWrapper {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></SvgWrapper>;
        const RawActivityIcon = (p) => <SvgWrapper {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></SvgWrapper>;
        const RawTrendingUpIcon = (p) => <SvgWrapper {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></SvgWrapper>;
        const RawShieldIcon = (p) => <SvgWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></SvgWrapper>;
        const RawAlertIcon = (p) => <SvgWrapper {...p}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgWrapper>;
        const RawShieldCheckIcon = (p) => <SvgWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></SvgWrapper>;
        const RawZapIcon = (p) => <SvgWrapper {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></SvgWrapper>;
        const RawPieChartIcon = (p) => <SvgWrapper {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></SvgWrapper>;
        const RawLandmarkIcon = (p) => <SvgWrapper {...p}><path d="M3 22h18" /><path d="M6 18v-7" /><path d="M10 18v-7" /><path d="M14 18v-7" /><path d="M18 18v-7" /><path d="M12 2l8 5H4z" /></SvgWrapper>;
        const RawBriefcaseIcon = (p) => <SvgWrapper {...p}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></SvgWrapper>;
        const RawBanknoteIcon = (p) => <SvgWrapper {...p}><rect width="20" height="12" x="2" y="6" rx="2" /><circle cx="12" cy="12" r="2" /><path d="M6 12h.01M18 12h.01" /></SvgWrapper>;



        const SafeIcon = ({ icon: IconComponent, ...props }) => {
            if (!IconComponent) return <div className="w-4 h-4 bg-blue-500/10 rounded" />;
            return <IconComponent {...props} />;
        };

        const StatCard = ({ title, value, subValue, icon: Icon, tooltip, color = 'blue', badge }) => {
            const colors = {
                blue: { bg: 'bg-blue-500/15', text: 'text-blue-400', glow: 'shadow-blue-500/20' },
                cyan: { bg: 'bg-cyan-500/15', text: 'text-cyan-400', glow: 'shadow-cyan-500/20' },
                indigo: { bg: 'bg-indigo-500/15', text: 'text-indigo-400', glow: 'shadow-indigo-500/20' },
                amber: { bg: 'bg-amber-500/15', text: 'text-amber-400', glow: 'shadow-amber-500/20' },
                emerald: { bg: 'bg-emerald-500/15', text: 'text-emerald-400', glow: 'shadow-emerald-500/20' },
                violet: { bg: 'bg-violet-500/15', text: 'text-violet-400', glow: 'shadow-violet-500/20' },
            };
            const c = colors[color] || colors.blue;
            return (
                <div className="bg-[#0f172a] border border-blue-900/30 p-5 rounded-2xl hover:border-blue-700/40 transition-all shadow-lg group relative h-full flex flex-col justify-between">
                    <div>
                        <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center gap-1.5">
                                <span className="text-blue-300/60 text-[10px] font-bold uppercase tracking-wider">{title}</span>
                                {tooltip && <Info className="w-3 h-3 text-blue-900 group-hover:text-blue-500 cursor-help transition-colors" />}
                            </div>
                            {Icon && (
                                <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${c.bg} shadow-lg ${c.glow} group-hover:scale-110 transition-transform`}>
                                    <Icon className={`w-4 h-4 ${c.text}`} />
                                </div>
                            )}
                        </div>
                        <div className="text-2xl font-semibold text-blue-50">{value}</div>
                    </div>
                    <div className="flex items-center gap-3 mt-2 min-h-[16px]">
                        <div className={`text-[11px] flex items-center font-medium ${subValue ? (subValue.startsWith('-') ? 'text-blue-400/60' : 'text-cyan-400') : ''}`}>
                            {subValue && (
                                <>
                                    {subValue.startsWith('-') ? <ArrowDownRight className="w-3 h-3 mr-1" /> : <ArrowUpRight className="w-3 h-3 mr-1" />}
                                    {subValue}
                                </>
                            )}
                        </div>
                        {badge}
                    </div>
                    {tooltip && (
                        <div className="absolute bottom-full left-0 mb-2 w-64 z-50 hidden group-hover:block">
                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                {tooltip.split('\n').map((line, i) => (
                                    <React.Fragment key={i}>
                                        {line}
                                        {i < tooltip.split('\n').length - 1 && <br />}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [autoRefresh, setAutoRefresh] = useState(() => { const v = localStorage.getItem('autoRefresh'); return v !== null ? JSON.parse(v) : true; });
            const [refreshInterval, setRefreshInterval] = useState(() => { const v = localStorage.getItem('refreshInterval'); return v ? parseInt(v) : 30; });
            const [baseline, setBaseline] = useState(() => { const v = localStorage.getItem('baseline'); return v ? parseInt(v) : 100000; });
            const [port, setPort] = useState(() => { const v = localStorage.getItem('port'); return v ? parseInt(v) : 7496; });
            const [clientId, setClientId] = useState(() => { const v = localStorage.getItem('clientId'); return v ? parseInt(v) : 10; });
            const [isPrivacyMode, setIsPrivacyMode] = useState(() => { const v = localStorage.getItem('isPrivacyMode'); return v !== null ? JSON.parse(v) : false; });
            const [connectionStatus, setConnectionStatus] = useState(false);
            const [connectedClientId, setConnectedClientId] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshing, setRefreshing] = useState(false);
            const [maPeriod, setMaPeriod] = useState(20);
            const [accountId, setAccountId] = useState(() => { return localStorage.getItem('accountId') || ""; });
            const [error, setError] = useState(null);

            const [availableAccounts, setAvailableAccounts] = useState([]);

            const maPeriodRef = useRef(20);
            const accountIdRef = useRef(localStorage.getItem('accountId') || "");
            const refreshingRef = useRef(false);
            const refreshTimeoutRef = useRef(null);

            const API_BASE = "http://localhost:8000/api";

            // Save variables to localStorage whenever they change
            useEffect(() => { localStorage.setItem('autoRefresh', JSON.stringify(autoRefresh)); }, [autoRefresh]);
            useEffect(() => { localStorage.setItem('refreshInterval', refreshInterval); }, [refreshInterval]);
            useEffect(() => { localStorage.setItem('baseline', baseline); }, [baseline]);
            useEffect(() => { localStorage.setItem('port', port); }, [port]);
            useEffect(() => { localStorage.setItem('clientId', clientId); }, [clientId]);
            useEffect(() => {
                localStorage.setItem('accountId', accountId);
                accountIdRef.current = accountId; // Sync ref
            }, [accountId]);
            useEffect(() => { localStorage.setItem('isPrivacyMode', JSON.stringify(isPrivacyMode)); }, [isPrivacyMode]);

            // Check connection on load
            useEffect(() => {
                checkStatus();
                const interval = setInterval(checkStatus, 5000);
                return () => clearInterval(interval);
            }, []);

            // Initial fetch when connection becomes active
            useEffect(() => {
                if (connectionStatus && !data) {
                    fetchData();
                }
            }, [connectionStatus]);

            // Auto-refresh: restarts whenever any config changes
            useEffect(() => {
                if (autoRefresh && connectionStatus) {
                    const interval = setInterval(() => fetchData(), refreshInterval * 1000);
                    return () => clearInterval(interval);
                }
            }, [autoRefresh, refreshInterval, connectionStatus]);

            const checkStatus = async () => {
                try {
                    const res = await fetch(`${API_BASE}/status`);
                    const info = await res.json();
                    setConnectionStatus(info.connected);
                    setConnectedClientId(info.client_id);

                    if (info.connected && info.accounts && info.accounts.length > 0) {
                        setAvailableAccounts(info.accounts);
                        // Auto select first account if current is empty or not in the list
                        if (!accountIdRef.current || !info.accounts.includes(accountIdRef.current)) {
                            setAccountId(info.accounts[0]);
                            accountIdRef.current = info.accounts[0];
                        }
                    }
                } catch (e) {
                    setConnectionStatus(false);
                }
            };

            const connectIB = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/connect`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ host: "127.0.0.1", port: parseInt(port), clientId: parseInt(clientId) })
                    });
                    if (res.ok) {
                        const jsonRes = await res.json();
                        setConnectionStatus(true);

                        // Handle auto-account detection
                        if (jsonRes.accounts && jsonRes.accounts.length > 0) {
                            setAvailableAccounts(jsonRes.accounts);
                            // Auto select first account if current is not in the list
                            if (!jsonRes.accounts.includes(accountIdRef.current)) {
                                setAccountId(jsonRes.accounts[0]);
                                accountIdRef.current = jsonRes.accounts[0];
                            }
                        }

                        // Await the initial fetch
                        const fetchSuccess = await fetchData(true);
                        if (!fetchSuccess) {
                            // If the initial fetch fails (e.g. invalid account), auto-disconnect
                            await disconnectIB();
                        }
                    } else {
                        const err = await res.json();
                        alert(err.detail);
                    }
                } catch (e) {
                    alert("Failed to connect to backend");
                }
                setLoading(false);
            };

            const disconnectIB = async () => {
                await fetch(`${API_BASE}/disconnect`, { method: 'POST' });
                setConnectionStatus(false);
                setData(null);
            };

            // Regular fetch — skips if one is already in progress (used by interval)
            const fetchData = async (force = false) => {
                if (refreshingRef.current && !force) return false;
                refreshingRef.current = true;
                setRefreshing(true);
                let success = false;
                try {
                    const res = await fetch(`${API_BASE}/data`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Always uses the REF so interval closures never capture stale value
                        body: JSON.stringify({ accountId: accountIdRef.current, maPeriod: maPeriodRef.current })
                    });
                    if (res.ok) {
                        setData(await res.json());
                        setError(null);
                        success = true;
                    }
                    else {
                        const err = await res.json();
                        setError(err.detail);
                    }
                } catch (e) { setError("Lost connection to backend"); }
                finally {
                    if (refreshTimeoutRef.current) clearTimeout(refreshTimeoutRef.current);
                    refreshTimeoutRef.current = setTimeout(() => {
                        refreshingRef.current = false;
                        setRefreshing(false);
                    }, 400);
                }
                return success;
            };

            // Force fetch with a specific period — safely resets the lock
            const forceFetch = async (period) => {
                maPeriodRef.current = period;  // update ref immediately, before fetch
                setMaPeriod(period);           // update state for display
                refreshingRef.current = true;
                setRefreshing(true);
                try {
                    const res = await fetch(`${API_BASE}/data`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ accountId: accountIdRef.current, maPeriod: period })
                    });
                    if (res.ok) { setData(await res.json()); setError(null); }
                    else { const err = await res.json(); setError(err.detail); }
                } catch (e) { setError("Lost connection to backend"); }
                finally {
                    if (refreshTimeoutRef.current) clearTimeout(refreshTimeoutRef.current);
                    refreshTimeoutRef.current = setTimeout(() => {
                        refreshingRef.current = false;
                        setRefreshing(false);
                    }, 400);
                }
            };

            let coverage = 0;
            if (data) {
                if (data.thresholdGains === 0) {
                    coverage = data.totalPsRisk > 0 ? Infinity : 0;
                } else {
                    coverage = (data.totalPsRisk / data.thresholdGains) * 100;
                }
            }
            const buffer = data ? (data.thresholdGains - data.totalPsRisk) : 0;

            // Helper to strictly format ALL numbers to exactly 2 decimal places
            const formatVal = (val) => val == null ? '--' : val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const pctOfNl = (val) => data && data.principalState ? `${(val / data.principalState * 100).toFixed(2)}% [% of PS]` : null;

            const getCardValue = (val) => {
                if (val == null) return "$--";
                if (isPrivacyMode) {
                    if (data && data.principalState) return `${(val / data.principalState * 100).toFixed(2)}%`;
                    return "***";
                }
                return `$${formatVal(val)}`;
            };

            const getCardSubValue = (val) => {
                if (isPrivacyMode || val == null) return null;
                return pctOfNl(val);
            };

            return (
                <div className="min-h-screen bg-[#020617] text-slate-300 font-sans selection:bg-blue-500/30">
                    {/* Sidebar */}
                    <aside className={`fixed left-0 top-0 h-full bg-[#070a13] border-r border-blue-900/20 transition-all duration-300 z-50 flex flex-col ${sidebarOpen ? 'w-72' : 'w-20'}`}>
                        <div className="p-6 flex items-center gap-3 border-b border-blue-900/10 shrink-0">
                            <div className="bg-blue-600/20 p-2 rounded-lg cursor-pointer" onClick={() => setSidebarOpen(!sidebarOpen)}>
                                <SafeIcon icon={Shield} className="w-6 h-6 text-blue-400" />
                            </div>
                            {sidebarOpen && <span className="font-bold text-lg tracking-tight text-blue-50 uppercase italic">Navigator</span>}
                        </div>

                        <div className="p-4 space-y-6 flex-grow custom-scrollbar relative">
                            {sidebarOpen && (
                                <>
                                    <div className="space-y-1 px-1">
                                        <label className="text-[10px] text-blue-500/50 uppercase font-bold tracking-widest">Baseline ($)</label>
                                        <input type="number" value={baseline} onChange={(e) => setBaseline(e.target.value)} className="w-full bg-blue-950/20 rounded-xl p-3 border border-blue-900/20 text-blue-50 font-bold focus:ring-0 text-md" />
                                    </div>
                                    <div className="space-y-2 px-1">
                                        <div className="relative group inline-flex items-center gap-1.5 cursor-help">
                                            <span className="text-[10px] text-blue-500/50 uppercase font-bold tracking-widest">Threshold Gains MA</span>
                                            <SafeIcon icon={Info} className="w-3 h-3 text-blue-900 group-hover:text-blue-500 transition-colors" />
                                            <div className="absolute left-full top-1/2 -translate-y-1/2 ml-2 w-64 z-50 hidden group-hover:block">
                                                <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                    The backend logic is configured to choose the tighter of your Stop Price and your Moving Average (MA) as the effective exit point for calculating metrics.
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            {[10, 20].map(p => (
                                                <button key={p}
                                                    onClick={() => { if (p !== maPeriod) forceFetch(p); }}
                                                    disabled={refreshing && p === maPeriod}
                                                    className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase border transition-all ${maPeriod === p
                                                        ? 'bg-cyan-500/20 border-cyan-500/50 text-cyan-300'
                                                        : 'bg-blue-950/20 border-blue-900/20 text-blue-500/50 hover:text-blue-300'
                                                        }`}>
                                                    MA{p}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={connectIB} disabled={loading || connectionStatus} className={`flex items-center justify-center gap-2 bg-blue-600/20 border border-blue-600/40 py-2 rounded-lg text-[10px] font-bold text-blue-400 transition-all uppercase ${(!connectionStatus && !loading) ? 'hover:bg-blue-600/30' : 'opacity-50'} ${connectionStatus ? 'col-span-1' : 'col-span-2'}`}>
                                            <Zap className="w-3 h-3" /> {loading ? "Connecting..." : (connectionStatus ? "Connected" : "Connect")}
                                        </button>
                                        {connectionStatus && (
                                            <button onClick={disconnectIB} className="col-span-1 flex items-center justify-center gap-2 bg-red-950/10 border border-red-900/20 py-2 rounded-lg text-[10px] font-bold text-red-500/60 hover:bg-red-900/20 transition-all uppercase">
                                                <SafeIcon icon={Power} className="w-3 h-3" /> Off
                                            </button>
                                        )}
                                    </div>
                                    <div className="bg-[#0b1021] border border-blue-900/30 p-4 rounded-2xl shadow-lg space-y-5 relative mt-4">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600/50 to-cyan-500/50 rounded-t-2xl"></div>

                                        <div className="flex items-center gap-2 mb-2 pb-2 border-b border-blue-900/20 text-[10px] font-bold uppercase tracking-widest text-blue-400">
                                            <SafeIcon icon={Settings} className="w-3.5 h-3.5 text-blue-500" />
                                            Connection Setup
                                        </div>

                                        <div className="space-y-1 px-1">
                                            <label className="text-[10px] text-blue-500/50 uppercase font-bold tracking-widest">IBKR Port</label>
                                            <input type="number" value={port} onChange={(e) => setPort(e.target.value)} className="w-full bg-blue-950/20 rounded-xl p-3 border border-blue-900/20 text-blue-50 font-bold focus:ring-0 text-md" />
                                            <div className="flex gap-2 mt-1">
                                                <button onClick={() => setPort(7496)} className="text-[8px] text-blue-400 hover:text-blue-200">Live (7496)</button>
                                                <button onClick={() => setPort(7497)} className="text-[8px] text-blue-400 hover:text-blue-200">Paper (7497)</button>
                                            </div>
                                        </div>
                                        <div className="space-y-1 px-1">
                                            <label className="text-[10px] text-blue-500/50 uppercase font-bold tracking-widest">Client ID</label>
                                            <input type="number" value={clientId} onChange={(e) => setClientId(e.target.value)} className="w-full bg-blue-950/20 rounded-xl p-3 border border-blue-900/20 text-blue-50 font-bold focus:ring-0 text-md" />
                                            {connectionStatus && connectedClientId !== null && (
                                                <div className="text-[9px] text-cyan-400 mt-1 uppercase font-bold">Active ID: {connectedClientId}</div>
                                            )}
                                        </div>
                                        <div className="space-y-1 px-1">
                                            <label className="text-[10px] text-blue-500/50 uppercase font-bold tracking-widest">Account ID</label>
                                            {availableAccounts.length > 0 ? (
                                                <div className="relative">
                                                    <select
                                                        value={accountId}
                                                        onChange={(e) => {
                                                            setAccountId(e.target.value);
                                                            accountIdRef.current = e.target.value;
                                                        }}
                                                        className="w-full bg-blue-950/20 rounded-xl p-3 border border-blue-900/20 text-blue-50 font-bold focus:ring-0 text-md appearance-none cursor-pointer pr-10"
                                                    >
                                                        {availableAccounts.map(acc => (
                                                            <option key={acc} value={acc} className="bg-slate-900 text-blue-50">{acc}</option>
                                                        ))}
                                                    </select>
                                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-blue-500/50">
                                                        <ChevronDown className="w-4 h-4" />
                                                    </div>
                                                </div>
                                            ) : (
                                                <input type="text" value={accountId} onChange={(e) => { setAccountId(e.target.value); accountIdRef.current = e.target.value; }} className="w-full bg-blue-950/20 rounded-xl p-3 border border-blue-900/20 text-blue-50 font-bold focus:ring-0 text-md" placeholder="Enter Account ID" />
                                            )}
                                        </div>
                                        <div className="space-y-3 bg-blue-950/10 p-3 rounded-xl border border-blue-900/10">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs text-blue-200/70">Auto-Refresh</span>
                                                <button onClick={() => { setAutoRefresh(!autoRefresh); if (!autoRefresh && connectionStatus) fetchData(); }} className={`w-8 h-4 rounded-full relative transition-colors ${autoRefresh ? 'bg-blue-600' : 'bg-slate-800'}`}>
                                                    <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${autoRefresh ? 'right-0.5' : 'left-0.5'}`} />
                                                </button>
                                            </div>
                                            <input type="range" min="5" max="60" value={refreshInterval} onChange={(e) => setRefreshInterval(e.target.value)} className="w-full h-1 bg-blue-950 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                            <div className="flex justify-between text-[9px] text-blue-500/50 font-bold">
                                                <span className="uppercase">Interval</span>
                                                <span>{refreshInterval}s</span>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className={`transition-all duration-300 ${sidebarOpen ? 'ml-72' : 'ml-20'} p-8 max-w-[1600px] mx-auto`}>
                        <header className="flex justify-between items-center mb-10 relative z-20">
                            <div className="flex items-center gap-4">
                                <div className="w-1 h-10 bg-gradient-to-b from-blue-600 to-cyan-400 rounded-full" />
                                <div>
                                    <h1 className="text-2xl font-semibold text-blue-50 tracking-tight">Risk Monitor</h1>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <Network className={`w-3 h-3 ${connectionStatus ? 'text-cyan-400' : 'text-red-500'}`} />
                                        <span className="text-blue-400/50 text-[10px] font-bold uppercase tracking-[0.2em]">
                                            {connectionStatus ? "Live IBKR Stream Active" : "Disconnected"}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={() => setIsPrivacyMode(!isPrivacyMode)} className={`flex items-center justify-center gap-2 px-3 py-2 border rounded-xl text-[10px] font-bold uppercase transition-all select-none active:scale-95 ${isPrivacyMode ? 'bg-cyan-900/40 border-cyan-500/50 text-cyan-300 hover:bg-cyan-900/60' : 'bg-blue-950/30 border-blue-900/40 text-blue-400 hover:bg-blue-900/40 hover:text-blue-200 cursor-pointer'}`}>
                                    <SafeIcon icon={isPrivacyMode ? EyeOff : Eye} className="w-4 h-4" /> {isPrivacyMode ? 'Privacy On' : 'Privacy Off'}
                                </button>
                                {connectionStatus && (
                                    <button onClick={(e) => { e.preventDefault(); console.log('Refresh manually triggered via UI'); fetchData(true); }} className={`flex items-center justify-center gap-2 px-4 py-2 border rounded-xl text-[10px] font-bold uppercase transition-all select-none active:scale-95 ${refreshing ? 'bg-blue-600/20 border-blue-500/40 text-blue-300 cursor-wait' : 'bg-blue-950/30 border-blue-900/40 text-blue-400 hover:bg-blue-900/40 hover:text-blue-200 cursor-pointer'}`}>
                                        <SafeIcon icon={RefreshCcw} className={`w-3.5 h-3.5 ${refreshing ? 'animate-spin' : ''}`} /> {refreshing ? 'Fetching...' : 'Refresh'}
                                    </button>
                                )}
                                <div className="text-right">
                                    <span className="text-[9px] font-bold text-blue-500/40 uppercase block">Last Update</span>
                                    <span className="text-xs font-mono text-blue-300">{data ? data.lastUpdate : "--:--:--"}</span>
                                </div>
                            </div>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-900/20 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center gap-3">
                                <AlertOctagon className="w-5 h-5" /> {error}
                            </div>
                        )}

                        {/* Risk Overview */}
                        <section className="mb-10 relative">
                            <div className="bg-[#0f172a] border border-blue-900/30 rounded-3xl p-8 relative shadow-2xl">
                                <div className="absolute top-0 right-0 w-80 h-80 bg-blue-500/5 blur-[100px] pointer-events-none -mr-32 -mt-32" />

                                <div className="relative flex flex-col lg:flex-row gap-12 items-center justify-between">
                                    <div className="flex-1 w-full flex flex-col justify-center">
                                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-8 md:gap-12">
                                            <div>
                                                <div className="flex items-center gap-2 text-blue-400/40 mb-4 font-bold text-[10px] tracking-[0.25em] uppercase">
                                                    <Cpu className="w-4 h-4" /> System Risk Monitor
                                                </div>
                                                <div className="text-blue-500/60 text-[10px] font-bold uppercase tracking-widest mb-2">Open Risk</div>
                                                <div className="text-5xl lg:text-6xl font-light text-blue-50 tracking-tighter">
                                                    {getCardValue(data?.totalPsRisk || 0)}
                                                </div>
                                                {!isPrivacyMode && (
                                                    <div className="text-cyan-400 text-[11px] font-medium mt-2 flex items-center">
                                                        {data && data.totalPsRisk > 0 ? <ArrowUpRight className="w-3 h-3 mr-1" /> : null}
                                                        {getCardSubValue(data?.totalPsRisk)}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="md:pb-1">
                                                <div className="relative group inline-flex items-center gap-1.5 cursor-help mb-2">
                                                    <span className="text-blue-500/40 text-[10px] font-bold uppercase tracking-widest">Safety Buffer</span>
                                                    <SafeIcon icon={Info} className="w-3 h-3 text-blue-900 group-hover:text-blue-500 transition-colors" />
                                                    <div className="absolute left-0 bottom-full mb-2 w-64 z-50 text-left hidden group-hover:block">
                                                        <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                            Threshold Gains minus Open Risk. A positive buffer means locked-in profits exceed current risk.
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className={`text-4xl lg:text-5xl font-medium ${buffer < 0 ? 'text-red-400' : 'text-blue-300'}`}>
                                                    {getCardValue(!data && buffer === 0 ? null : buffer)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Vertical Risk Coverage Bar */}
                                    <div className="w-full lg:w-auto lg:border-l border-blue-900/10 lg:pl-12 flex justify-center lg:justify-start items-stretch gap-6 h-40">
                                        {/* Left Labels */}
                                        <div className="flex flex-col justify-between text-[8px] font-bold text-blue-500/30 uppercase tracking-[0.2em] text-right py-1">
                                            <span className="text-blue-400">Defense (100%)</span>
                                            <span>Caution (50%)</span>
                                            <span>Safe</span>
                                        </div>

                                        {/* Vertical progression Bar */}
                                        <div className="relative w-3 bg-blue-950 rounded-full border border-blue-900/30 p-[1px] flex flex-col justify-end overflow-hidden">
                                            <div className={`w-full rounded-full transition-all duration-1000 ${coverage >= 100 ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-gradient-to-t from-blue-900 via-blue-600 to-cyan-400'}`} style={{ height: `${Math.min(100, coverage)}%` }} />
                                        </div>

                                        {/* Info and Value */}
                                        <div className="flex flex-col justify-between py-1 min-w-[120px]">
                                            <div className="relative group inline-flex items-start gap-1.5 cursor-help">
                                                <span className="text-[10px] font-bold text-blue-500/50 uppercase tracking-widest leading-tight">Risk Coverage<br />Ratio</span>
                                                <SafeIcon icon={Info} className="w-3 h-3 text-blue-900 group-hover:text-blue-500 transition-colors shrink-0" />
                                                <div className="absolute right-0 lg:left-0 top-full mt-2 w-64 z-50 hidden group-hover:block">
                                                    <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                        (Open Risk / Threshold Gains). The percentage of stable profits currently at risk in the market.
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <span className={`text-3xl font-medium ${coverage >= 100 ? 'text-red-400' : 'text-blue-100'}`}>{formatVal(coverage)}%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Cards */}
                        <section className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-12">
                            {/* Row 1 */}
                            <div className="col-span-1">
                                <StatCard color="blue" title="Net Liquidation [NL]" value={getCardValue(data?.netLiquidation)} subValue={getCardSubValue(data?.netLiquidation)} icon={RawLandmarkIcon} tooltip={'The true Net Liquidation Value fetched directly from Interactive Brokers API.\n\nFormula: API Fetch (NetLiquidation)'} />
                            </div>
                            <div className="col-span-1">
                                <StatCard color="orange" title="Open Risk" value={getCardValue(data?.totalPsRisk)} subValue={getCardSubValue(data?.totalPsRisk)} icon={RawAlertIcon} tooltip={'The total Principal State Risk across all open positions. It shows the total portion of risk that represents original principal capital vs just floating profits.\n\nFormula: ∑ PS Risk'} />
                            </div>
                            <div className="col-span-1">
                                <StatCard color="blue" title="Cash" value={getCardValue(data?.cash)} subValue={getCardSubValue(data?.cash)} icon={RawBanknoteIcon} tooltip={'Total settled and unsettled cash available in the account.\n\nFormula: API Fetch (CashBalance)'} />
                            </div>
                            <div className="col-span-1">
                                <StatCard color="emerald" title="Growth State (Open Profits)" value={getCardValue(data?.growthState)} subValue={getCardSubValue(data?.growthState)} icon={RawTrendingUpIcon} tooltip={"Unrealized PnL — the total floating profit or loss across all open positions.\n\nFormula: ∑ (Unrealized PNL for each Position)"} />
                            </div>

                            {/* Row 2 */}
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Market Value of Positions" value={getCardValue(data?.marketValueOfPositions)} subValue={getCardSubValue(data?.marketValueOfPositions)} icon={RawBriefcaseIcon} tooltip={'The current total market value (mark price) of all open positions.\n\nFormula: API Fetch (∑ MarketValue)'} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Weighted ADR" value={data ? `${formatVal(data.weightedAdr)}%` : "--%"} subValue={null} icon={RawActivityIcon} tooltip={"Weighted Average Daily Range (20 days) across all positions, proportional to their market value allocation.\n\nFormula: ∑ [ (Position Value / Total Market Value) × ADR ]"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Money Allocated" value={getCardValue(data?.moneyAllocated)} subValue={getCardSubValue(data?.moneyAllocated)} icon={RawPieChartIcon} tooltip={"The total initial capital (cost basis) invested across all open positions.\n\nFormula: ∑ (Position Quantity × Average Cost)"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="emerald" title="Threshold Gains" value={getCardValue(data?.thresholdGains)} subValue={getCardSubValue(data?.thresholdGains)} icon={RawShieldCheckIcon} tooltip={`The portion of your unrealized profits that are "stable" because they are protected by either your current stop-loss levels or your MA${maPeriod} threshold.\n\nFormula: ∑ [abs(Exit Price - Entry Price) × Position Quantity]`} />
                            </div>

                            {/* Row 3 */}
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Total Money" value={getCardValue(data?.totalMoney)} subValue={getCardSubValue(data?.totalMoney)} icon={RawWalletIcon} tooltip={"The current total value of your account, representing the sum of your Principal State and your Growth State.\n\nFormula: Principal State + Growth State"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Principal State" value={getCardValue(data?.principalState)} subValue={getCardSubValue(data?.principalState)} icon={RawShieldIcon} tooltip={'The "real" value of your account — the money you truly own after subtracting open risk from your cash and allocated capital.\n\nFormula: (Cash + Money Allocated) - Open Risk'} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Total Market's Money" value={getCardValue(data?.openRisk)} subValue={getCardSubValue(data?.openRisk)} icon={RawAlertIcon} tooltip={"The absolute maximum amount of money—whether it's your principal or unprotected profits—that the market can physically take back from you right now, assuming no drastic price gaps past your stops.\n\nFormula: ∑ [abs(Market Price - Exit Price) × Position Quantity]"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="emerald" title="Dynamic Gains" value={getCardValue(data?.dynamicGains)} subValue={getCardSubValue(data?.dynamicGains)} icon={RawZapIcon} tooltip={'The fluid portion of your profits that fluctuates with market volatility and has not yet been "locked in" by a protective stop.\n\nFormula: Growth State - Threshold Gains'} />
                            </div>
                        </section>

                        {/* Positions Table */}
                        <section>
                            <div className="bg-[#0f172a] border border-blue-900/20 rounded-2xl shadow-2xl">
                                <div>
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-blue-950/20 border-b border-blue-900/10">
                                                <th className="px-6 py-4 text-[10px] font-bold text-blue-50 uppercase">Symbol</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-slate-500 uppercase text-right">Pos</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-slate-500 uppercase text-right">Avg Cost</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-slate-500 uppercase text-right">Size</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-slate-500 uppercase text-right">% of NL</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-blue-50 uppercase text-right">Price</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-amber-400/80 uppercase text-right">Stop</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-purple-400/80 uppercase text-right" title="Average Daily Range (20 days)">ADR</th>

                                                <th className={`px-6 py-4 text-[10px] font-bold uppercase text-right ${maPeriod === 10 ? 'text-cyan-400' : 'text-blue-400/40'}`}>MA10</th>
                                                <th className={`px-6 py-4 text-[10px] font-bold uppercase text-right ${maPeriod === 20 ? 'text-cyan-400' : 'text-blue-400/40'}`}>MA20</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-cyan-400 uppercase text-right">PnL</th>
                                                <th className="px-6 py-4 text-[10px] font-bold text-blue-400/80 uppercase text-right">Risk</th>
                                                <th className="px-6 py-4 text-right">
                                                    <div className="relative group inline-flex items-center justify-end w-full gap-1.5 cursor-help">
                                                        <div className="absolute right-0 bottom-full mb-2 w-64 z-50 text-left hidden group-hover:block whitespace-normal font-normal">
                                                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                                Risk regarding the principal (Risk - PNL). Shows the portion of the whole risk that is the cost of the stop from the entry location.
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-bold text-orange-400/80 uppercase">PS Risk</span>
                                                        <SafeIcon icon={Info} className="w-3 h-3 text-orange-400/60 group-hover:text-orange-400 transition-colors" />
                                                    </div>
                                                </th>
                                                <th className="px-6 py-4 text-right">
                                                    <div className="relative group inline-flex items-center justify-end w-full gap-1.5 cursor-help">
                                                        <div className="absolute right-0 bottom-full mb-2 w-64 z-50 text-left hidden group-hover:block whitespace-normal font-normal">
                                                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                                The backend logic chooses the tighter of your Stop Price and Moving Average (MA) as the effective exit point. It will only account for T-Gain if the stop price is moved in favor of the trade, protecting gains.
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase">T-Gain</span>
                                                        <SafeIcon icon={Info} className="w-3 h-3 text-slate-500 group-hover:text-blue-500 transition-colors" />
                                                    </div>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-blue-900/5 text-sm">
                                            {data && data.positions.map((pos) => (
                                                <tr key={pos.symbol} className="hover:bg-blue-900/10 transition-colors group">
                                                    <td className="px-6 py-4 font-bold text-blue-50">{pos.symbol}</td>
                                                    <td className="px-6 py-4 text-right text-slate-500">{isPrivacyMode ? "***" : pos.pos.toLocaleString('en-US')}</td>
                                                    <td className="px-6 py-4 text-right text-slate-500">${formatVal(pos.avgCost)}</td>
                                                    <td className="px-6 py-4 text-right text-slate-500">{isPrivacyMode ? "***" : `$${formatVal(Math.abs(pos.pos * pos.avgCost))}`}</td>
                                                    <td className="px-6 py-4 text-right text-slate-500">{data.netLiquidation ? (Math.abs(pos.pos * pos.avgCost) / data.netLiquidation * 100).toFixed(2) + '%' : '--'}</td>
                                                    <td className="px-6 py-4 text-right text-blue-50">${formatVal(pos.price)}</td>
                                                    <td className="px-6 py-4 text-right font-mono">
                                                        {pos.stop ? (
                                                            <span className="text-amber-400/80">${formatVal(pos.stop)}</span>
                                                        ) : (
                                                            <span className="text-cyan-400/80 font-semibold" title={`Using MA${maPeriod} as fallback stop`}>MA{maPeriod}</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-mono text-purple-400/80">{pos.adr ? `${formatVal(pos.adr)}%` : '--'}</td>

                                                    <td className={`px-6 py-4 text-right font-mono ${maPeriod === 10 ? 'text-cyan-400 font-semibold' : 'text-blue-400/40'}`}>{pos.ma10 ? `$${formatVal(pos.ma10)}` : '--'}</td>
                                                    <td className={`px-6 py-4 text-right font-mono ${maPeriod === 20 ? 'text-cyan-400 font-semibold' : 'text-blue-400/40'}`}>{pos.ma20 ? `$${formatVal(pos.ma20)}` : '--'}</td>
                                                    <td className={`px-6 py-4 text-right font-semibold ${pos.pnl > 0 ? 'text-cyan-400' : 'text-blue-400/60'}`}>
                                                        {isPrivacyMode ? "***" : `$${formatVal(pos.pnl)}`}
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-bold text-blue-400/80">{isPrivacyMode ? "***" : `$${formatVal(pos.risk)}`}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-orange-400/80">{isPrivacyMode ? "***" : `$${formatVal(pos.psRisk)}`}</td>
                                                    <td className="px-6 py-4 text-right text-slate-500">{isPrivacyMode ? "***" : `$${formatVal(pos.tGain)}`}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {!data && <div className="p-12 text-center text-blue-900 font-bold uppercase tracking-widest">No Active Connection</div>}
                                </div>
                            </div>
                        </section>

                        {/* FAQ Section */}
                        <section className="mt-8">
                            <div className="bg-[#0f172a] border border-blue-900/20 rounded-2xl overflow-hidden shadow-2xl p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <SafeIcon icon={Info} className="w-5 h-5 text-blue-400" />
                                    <h2 className="text-lg font-semibold text-blue-50">FAQ</h2>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-blue-950/20 border border-blue-900/20 p-5 rounded-xl">
                                        <h3 className="font-semibold text-blue-100 mb-2">What Total Market's Money Actually Is?</h3>
                                        <p className="text-sm text-slate-400 mb-3">
                                            If every single one of your active positions immediately dropped and triggered your stop price (or fell to your Moving Average fallback), your total account balance would drop by the exact amount shown in the Total Market's Money box.
                                        </p>
                                        <p className="text-sm text-slate-400 mb-3">
                                            Your Total Market's Money is a combination of two things:
                                        </p>
                                        <ul className="text-sm text-slate-400 space-y-2 list-decimal pl-5 marker:text-blue-500/50">
                                            <li>
                                                <strong className="text-blue-300 font-medium">Sinking Principal (The Bad Risk, or Open Risk):</strong> If you enter a trade and it immediately goes against you, the difference between your Current Price and the Stop Loss represents original capital (your own money) that you are risking.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">Dynamic Gains (The Fluid Profit Risk):</strong> If you are in a winning trade but you haven't moved your stop up to protect that profit yet, the difference between the Current Price and the Stop Loss represents "The Market's Money" that you are currently floating. You haven't locked it in, so it's technically at risk of being given back.
                                            </li>
                                        </ul>
                                        <p className="text-sm text-slate-400 mt-3 italic">
                                            Total Market's Money combines these two numbers across your entire portfolio. It is the absolute maximum amount of money—whether it's your principal or unprotected profits—that the market can physically take back from you right now, assuming no drastic price gaps past your stops.
                                        </p>
                                    </div>
                                    <div className="bg-blue-950/20 border border-blue-900/20 p-5 rounded-xl">
                                        <h3 className="font-semibold text-blue-100 mb-2">What is the purpose of the Risk Coverage Ratio?</h3>
                                        <p className="text-sm text-slate-400 mb-3">
                                            The Risk Coverage Ratio tells you what percentage of your secured profits you are currently risking in the market. It shows the relationship between your true Open Risk (Principal State Risk) and your Threshold Gains.
                                        </p>
                                        <ul className="text-sm text-slate-400 space-y-2 list-disc pl-5 marker:text-blue-500/50">
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is low (e.g., &lt; 50% "Safe/Caution"):</strong> You are risking a fraction of your protected profits. Even if all your current risks were realized (hit your stops), you would still be left with a net positive gain from your protected positions.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is 100% ("Defense"):</strong> You are risking exactly as much as you have secured. Your "Safety Buffer" is $0.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is &gt; 100%:</strong> You are risking more than your current protected profits. This means if all your stops were hit, your recent protected gains wouldn't be enough to cover the losses, and it would eat into your principal.
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
