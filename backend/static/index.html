<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBKR Risk Monitor</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React (UMD) -->
    <script src="https://unpkg.com/lucide-react@0.380.0/dist/umd/lucide-react.js"></script>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Robust icon handling
        const Lucide = window.lucideReact || window.LucideReact || {};
        const IconProxy = new Proxy(Lucide, {
            get: (target, prop) => {
                if (target[prop]) return target[prop];
                // Fallback icon component
                return (props) => (
                    <div className={props.className || "w-4 h-4"}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="12" cy="12" r="10" />
                        </svg>
                    </div>
                );
            }
        });

        const {
            Shield, Activity, TrendingUp, ShieldCheck, Settings, RefreshCcw,
            Power, Info, ArrowUpRight, ArrowDownRight, Wallet, Zap,
            Cpu, BarChart3, ChevronDown, AlertOctagon, Network, Circle, Database, Radio,
            Eye, EyeOff
        } = IconProxy;

        // Custom Inline Icons for reliable rendering
        const SvgWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-4 h-4"}>{children}</svg>
        );
        const RawDatabaseIcon = (p) => <SvgWrapper {...p}><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5V19A9 3 0 0 0 21 19V5" /><path d="M3 12A9 3 0 0 0 21 12" /></SvgWrapper>;
        const RawWalletIcon = (p) => <SvgWrapper {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></SvgWrapper>;
        const RawActivityIcon = (p) => <SvgWrapper {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></SvgWrapper>;
        const RawTrendingUpIcon = (p) => <SvgWrapper {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></SvgWrapper>;
        const RawShieldIcon = (p) => <SvgWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></SvgWrapper>;
        const RawAlertIcon = (p) => <SvgWrapper {...p}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgWrapper>;
        const RawShieldCheckIcon = (p) => <SvgWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></SvgWrapper>;
        const RawZapIcon = (p) => <SvgWrapper {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></SvgWrapper>;
        const RawPieChartIcon = (p) => <SvgWrapper {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></SvgWrapper>;
        const RawLandmarkIcon = (p) => <SvgWrapper {...p}><path d="M3 22h18" /><path d="M6 18v-7" /><path d="M10 18v-7" /><path d="M14 18v-7" /><path d="M18 18v-7" /><path d="M12 2l8 5H4z" /></SvgWrapper>;
        const RawBriefcaseIcon = (p) => <SvgWrapper {...p}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></SvgWrapper>;
        const RawBanknoteIcon = (p) => <SvgWrapper {...p}><rect width="20" height="12" x="2" y="6" rx="2" /><circle cx="12" cy="12" r="2" /><path d="M6 12h.01M18 12h.01" /></SvgWrapper>;
        const RawEyeIcon = (p) => <SvgWrapper {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></SvgWrapper>;
        const RawEyeOffIcon = (p) => <SvgWrapper {...p}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><line x1="2" y1="2" x2="22" y2="22" /></SvgWrapper>;
        const RawChevronLeftIcon = (p) => <SvgWrapper {...p}><polyline points="15 18 9 12 15 6" /></SvgWrapper>;
        const RawChevronRightIcon = (p) => <SvgWrapper {...p}><polyline points="9 18 15 12 9 6" /></SvgWrapper>;
        const RawChevronDownIcon = (p) => <SvgWrapper {...p}><polyline points="6 9 12 15 18 9" /></SvgWrapper>;
        const RawPowerIcon = (p) => <SvgWrapper {...p}><path d="M18.36 6.64a9 9 0 1 1-12.73 0" /><line x1="12" y1="2" x2="12" y2="12" /></SvgWrapper>;
        const RawRefreshCcwIcon = (p) => <SvgWrapper {...p}><polyline points="1 4 1 10 7 10" /><polyline points="23 20 23 14 17 14" /><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" /></SvgWrapper>;
        const RawSettingsIcon = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></SvgWrapper>;
        const RawInfoIcon = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></SvgWrapper>;
        const RawArrowUpRightIcon = (p) => <SvgWrapper {...p}><path d="M7 17 17 7" /><path d="M7 7h10v10" /></SvgWrapper>;
        const RawArrowDownRightIcon = (p) => <SvgWrapper {...p}><path d="M7 7 17 17" /><path d="M17 7v10H7" /></SvgWrapper>;
        const RawNetworkIcon = (p) => <SvgWrapper {...p}><rect x="16" y="16" width="6" height="6" rx="1" /><rect x="2" y="16" width="6" height="6" rx="1" /><rect x="9" y="2" width="6" height="6" rx="1" /><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3" /><path d="M12 12V8" /></SvgWrapper>;
        const RawAlertOctagonIcon = (p) => <SvgWrapper {...p}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgWrapper>;
        const RawCpuIcon = (p) => <SvgWrapper {...p}><rect x="4" y="4" width="16" height="16" rx="2" /><rect x="9" y="9" width="6" height="6" /><path d="M15 2v2M9 2v2M2 15h2M2 9h2M22 15h-2M22 9h-2M15 22v-2M9 22v-2" /></SvgWrapper>;



        const SafeIcon = ({ icon: IconComponent, ...props }) => {
            if (!IconComponent) return <div className="w-4 h-4 bg-blue-500/10 rounded" />;
            return <IconComponent {...props} />;
        };

        const StatCard = ({ title, value, subValue, icon: Icon, tooltip, color = 'blue', badge }) => {
            const colors = {
                blue: { bg: 'bg-blue-500/15', text: 'text-blue-400', glow: 'shadow-blue-500/20' },
                cyan: { bg: 'bg-cyan-500/15', text: 'text-cyan-400', glow: 'shadow-cyan-500/20' },
                indigo: { bg: 'bg-indigo-500/15', text: 'text-indigo-400', glow: 'shadow-indigo-500/20' },
                amber: { bg: 'bg-amber-500/15', text: 'text-amber-400', glow: 'shadow-amber-500/20' },
                emerald: { bg: 'bg-emerald-500/15', text: 'text-emerald-400', glow: 'shadow-emerald-500/20' },
                violet: { bg: 'bg-violet-500/15', text: 'text-violet-400', glow: 'shadow-violet-500/20' },
            };
            const c = colors[color] || colors.blue;
            return (
                <div className="bg-[#0f172a] border border-blue-900/30 p-5 rounded-2xl hover:border-blue-700/40 transition-all shadow-lg group relative h-full flex flex-col justify-between">
                    <div>
                        <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center gap-1.5">
                                <span className="text-blue-300/60 text-[10px] font-bold uppercase tracking-wider">{title}</span>
                                {tooltip && <RawInfoIcon className="w-3 h-3 text-blue-900 group-hover:text-blue-500 cursor-help transition-colors" />}
                            </div>
                            {Icon && (
                                <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${c.bg} shadow-lg ${c.glow} group-hover:scale-110 transition-transform`}>
                                    <Icon className={`w-4 h-4 ${c.text}`} />
                                </div>
                            )}
                        </div>
                        <div className="text-2xl font-semibold text-blue-50">{value}</div>
                    </div>
                    <div className="flex items-center gap-3 mt-2 min-h-[16px]">
                        <div className={`text-[11px] flex items-center font-medium ${subValue ? (subValue.startsWith('-') ? 'text-blue-400/60' : 'text-cyan-400') : ''}`}>
                            {subValue && (
                                <>
                                    {subValue !== "[% of PS]" && (subValue.startsWith('-') ? <RawArrowDownRightIcon className="w-3 h-3 mr-1" /> : <RawArrowUpRightIcon className="w-3 h-3 mr-1" />)}
                                    {subValue}
                                </>
                            )}
                        </div>
                        {badge}
                    </div>
                    {tooltip && (
                        <div className="absolute bottom-full left-0 mb-2 w-64 z-50 hidden group-hover:block">
                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                {tooltip.split('\n').map((line, i) => (
                                    <React.Fragment key={i}>
                                        {line}
                                        {i < tooltip.split('\n').length - 1 && <br />}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PositionChart = ({ data, isPrivacyMode }) => {
            if (!data || !data.positions || data.positions.length === 0) return null;

            // Helper to strictly format ALL numbers to exactly 2 decimal places
            const formatVal = (val) => val == null ? '--' : val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const maxVal = data.positions.reduce((max, p) => {
                const val = Math.abs((p.pos || 0) * (p.price || 0));
                return Math.max(max, val);
            }, 0);

            return (
                <section className="mt-8 mb-12" id="position-chart-section">
                    <div className="bg-[#0f172a] border border-blue-900/20 rounded-2xl shadow-2xl p-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-4 border-b border-blue-900/10">
                            <div className="flex items-center gap-2">
                                <RawActivityIcon className="w-5 h-5 text-blue-400" />
                                <h2 className="text-lg font-semibold text-blue-50">Position Exposure & Risk</h2>
                            </div>
                            
                            {/* Legend */}
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-blue-600/30 border border-blue-500/20 rounded-sm" />
                                    <span className="text-[10px] font-bold text-blue-300/60 uppercase tracking-wider">Position Value</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-cyan-400/80 rounded-sm shadow-[0_0_8px_rgba(34,211,238,0.3)]" />
                                    <span className="text-[10px] font-bold text-cyan-400 uppercase tracking-wider">Market's Money (Risk)</span>
                                </div>
                                <div className="ml-2 hidden lg:block">
                                    <span className="text-[10px] text-blue-500/50 font-bold uppercase tracking-widest">Visual Scale: Max {isPrivacyMode ? "***" : `$${formatVal(maxVal)}`}</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex h-80 relative mb-6">
                            {/* Y-Axis Label */}
                            <div className="absolute left-0 top-0 bottom-10 flex items-center justify-center -ml-12">
                                <span className="text-[9px] font-bold text-blue-500/40 uppercase tracking-[0.3em] -rotate-90 whitespace-nowrap">Exposure ($)</span>
                            </div>

                            <div className="flex-1 flex items-end gap-3 px-2 overflow-x-auto custom-scrollbar pb-10 ml-6">
                                {data.positions.map((pos) => {
                                    const totalValue = Math.abs((pos.pos || 0) * (pos.price || 0));
                                    const riskValue = pos.risk || 0;
                                    const heightBase = maxVal > 0 ? (totalValue / maxVal) * 100 : 0;
                                    const riskPercentage = totalValue > 0 ? (riskValue / totalValue) * 100 : 0;

                                    return (
                                        <div key={pos.symbol} className="flex-1 min-w-[60px] max-w-[120px] flex flex-col items-center group relative h-full justify-end">
                                            {/* Tooltip */}
                                            <div className="absolute bottom-full mb-3 hidden group-hover:block z-50">
                                                <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[10px] p-2.5 rounded-xl shadow-2xl whitespace-nowrap">
                                                    <div className="font-bold text-blue-50 mb-1.5 border-b border-blue-900/20 pb-1">{pos.symbol}</div>
                                                    <div className="flex flex-col gap-0.5">
                                                        <div className="flex justify-between gap-4"><span>Value:</span> <span className="text-blue-50 font-mono">{isPrivacyMode ? "***" : `$${formatVal(totalValue)}`}</span></div>
                                                        <div className="flex justify-between gap-4"><span>Risk:</span> <span className="text-cyan-400 font-mono">{isPrivacyMode ? "***" : `$${formatVal(riskValue)}`}</span></div>
                                                        <div className="flex justify-between gap-4"><span>ADR:</span> <span className="text-purple-400 font-mono">{pos.adr ? `${formatVal(pos.adr)}%` : '--'}</span></div>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Bar Container */}
                                            <div className="w-full relative flex flex-col justify-end overflow-hidden rounded-t-lg bg-blue-600/10 border border-blue-900/20 hover:border-blue-500/40 transition-all cursor-pointer group-hover:scale-[1.02]" style={{ height: `${Math.max(5, (heightBase * 0.85))}%` }}>
                                                {/* Risk Segment (Market's Money) */}
                                                <div className="w-full bg-cyan-400/80 shadow-[0_0_15px_rgba(34,211,238,0.2)]" style={{ height: `${Math.min(100, riskPercentage)}%` }} />
                                                {/* Base Value Segment */}
                                                <div className="w-full bg-blue-600/30 flex-1" />
                                            </div>

                                            {/* Labels (X-Axis Items) */}
                                            <div className="absolute -bottom-8 flex flex-col items-center">
                                                <span className="text-[10px] font-bold text-blue-300/60 group-hover:text-blue-50 uppercase transition-colors">{pos.symbol}</span>
                                                <span className="text-[9px] text-purple-400/60 font-mono mt-0.5">{pos.adr ? `${formatVal(pos.adr)}%` : '--'}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* X-Axis Label */}
                            <div className="absolute -bottom-6 left-0 right-0 flex justify-center h-4">
                                <span className="text-[9px] font-bold text-blue-500/40 uppercase tracking-[0.3em]">
                                    Positions (Symbol / <span className="text-purple-400/80 font-bold">ADR%</span>)
                                </span>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [autoRefresh, setAutoRefresh] = useState(() => { const v = localStorage.getItem('autoRefresh'); return v !== null ? JSON.parse(v) : true; });
            const [refreshInterval, setRefreshInterval] = useState(() => { const v = localStorage.getItem('refreshInterval'); return v ? parseInt(v) : 30; });
            const [baseline, setBaseline] = useState(() => { const v = localStorage.getItem('baseline'); return v ? parseInt(v) : 100000; });
            const [port, setPort] = useState(() => { const v = localStorage.getItem('port'); return v ? parseInt(v) : 7496; });
            const [clientId, setClientId] = useState(() => { const v = localStorage.getItem('clientId'); return v ? parseInt(v) : 10; });
            const [isPrivacyMode, setIsPrivacyMode] = useState(() => { const v = localStorage.getItem('isPrivacyMode'); return v !== null ? JSON.parse(v) : false; });
            const [connectionStatus, setConnectionStatus] = useState(false);
            const [connectedClientId, setConnectedClientId] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshing, setRefreshing] = useState(false);
            const [maPeriod, setMaPeriod] = useState(20);
            const [accountId, setAccountId] = useState(() => { return localStorage.getItem('accountId') || ""; });
            const [error, setError] = useState(null);

            const [availableAccounts, setAvailableAccounts] = useState([]);

            const maPeriodRef = useRef(20);
            const accountIdRef = useRef(localStorage.getItem('accountId') || "");
            const refreshingRef = useRef(false);
            const refreshTimeoutRef = useRef(null);

            const API_BASE = "http://localhost:8000/api";

            // Save variables to localStorage whenever they change
            useEffect(() => { localStorage.setItem('autoRefresh', JSON.stringify(autoRefresh)); }, [autoRefresh]);
            useEffect(() => { localStorage.setItem('refreshInterval', refreshInterval); }, [refreshInterval]);
            useEffect(() => { localStorage.setItem('baseline', baseline); }, [baseline]);
            useEffect(() => { localStorage.setItem('port', port); }, [port]);
            useEffect(() => { localStorage.setItem('clientId', clientId); }, [clientId]);
            useEffect(() => {
                localStorage.setItem('accountId', accountId);
                accountIdRef.current = accountId; // Sync ref
            }, [accountId]);
            useEffect(() => { localStorage.setItem('isPrivacyMode', JSON.stringify(isPrivacyMode)); }, [isPrivacyMode]);

            // Check connection on load
            useEffect(() => {
                checkStatus();
                const interval = setInterval(checkStatus, 5000);
                return () => clearInterval(interval);
            }, []);

            // Initial fetch when connection becomes active
            useEffect(() => {
                if (connectionStatus && !data) {
                    fetchData();
                }
            }, [connectionStatus]);

            // Auto-refresh: restarts whenever any config changes
            useEffect(() => {
                if (autoRefresh && connectionStatus) {
                    const interval = setInterval(() => fetchData(), refreshInterval * 1000);
                    return () => clearInterval(interval);
                }
            }, [autoRefresh, refreshInterval, connectionStatus]);

            const checkStatus = async () => {
                try {
                    const res = await fetch(`${API_BASE}/status`);
                    const info = await res.json();
                    setConnectionStatus(info.connected);
                    setConnectedClientId(info.client_id);

                    if (info.connected && info.accounts && info.accounts.length > 0) {
                        setAvailableAccounts(info.accounts);
                        // Auto select first account if current is empty or not in the list
                        if (!accountIdRef.current || !info.accounts.includes(accountIdRef.current)) {
                            setAccountId(info.accounts[0]);
                            accountIdRef.current = info.accounts[0];
                        }
                    }
                } catch (e) {
                    setConnectionStatus(false);
                }
            };

            const connectIB = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/connect`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ host: "127.0.0.1", port: parseInt(port), clientId: parseInt(clientId) })
                    });
                    if (res.ok) {
                        const jsonRes = await res.json();
                        setConnectionStatus(true);

                        // Handle auto-account detection
                        if (jsonRes.accounts && jsonRes.accounts.length > 0) {
                            setAvailableAccounts(jsonRes.accounts);
                            // Auto select first account if current is not in the list
                            if (!jsonRes.accounts.includes(accountIdRef.current)) {
                                setAccountId(jsonRes.accounts[0]);
                                accountIdRef.current = jsonRes.accounts[0];
                            }
                        }

                        // Await the initial fetch
                        const fetchSuccess = await fetchData(true);
                        if (!fetchSuccess) {
                            // If the initial fetch fails (e.g. invalid account), auto-disconnect
                            await disconnectIB();
                        }
                    } else {
                        const err = await res.json();
                        alert(err.detail);
                    }
                } catch (e) {
                    alert("Failed to connect to backend");
                }
                setLoading(false);
            };

            const disconnectIB = async () => {
                await fetch(`${API_BASE}/disconnect`, { method: 'POST' });
                setConnectionStatus(false);
                setData(null);
            };

            // Regular fetch — skips if one is already in progress (used by interval)
            const fetchData = async (force = false) => {
                if (refreshingRef.current && !force) return false;
                refreshingRef.current = true;
                setRefreshing(true);
                let success = false;
                try {
                    const res = await fetch(`${API_BASE}/data`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Always uses the REF so interval closures never capture stale value
                        body: JSON.stringify({ accountId: accountIdRef.current, maPeriod: maPeriodRef.current })
                    });
                    if (res.ok) {
                        const json = await res.json();
                        if (json.positions) {
                            json.positions.sort((a, b) => {
                                const valA = Math.abs((a.pos || 0) * (a.price || 0));
                                const valB = Math.abs((b.pos || 0) * (b.price || 0));
                                return valB - valA;
                            });

                            {/* Row 1 */}
                            <div className="md:col-span-2">
                                <StatCard color="blue" title="Net Liquidation" value={getCardValue(data?.netLiquidation)} subValue={getCardSubValue(data?.netLiquidation)} icon={RawLandmarkIcon} tooltip={'The true Net Liquidation Value fetched directly from Interactive Brokers API.\n\nFormula: API Fetch (NetLiquidation)'} />
                            </div>
                            <div className="col-span-1">
                                <StatCard color="blue" title="Market Value of Positions" value={getCardValue(data?.marketValueOfPositions)} subValue={getCardSubValue(data?.marketValueOfPositions)} icon={RawBriefcaseIcon} tooltip={'The current total market value (mark price) of all open positions.\n\nFormula: API Fetch (∑ MarketValue)'} />
                            </div>
                            <div className="col-span-1">
                                <StatCard color="emerald" title="Growth State (Open Profits)" value={getCardValue(data?.growthState)} subValue={getCardSubValue(data?.growthState)} icon={RawTrendingUpIcon} tooltip={"Unrealized PnL — the total floating profit or loss across all open positions.\n\nFormula: ∑ (Unrealized PNL for each Position)"} />
                            </div>

                            {/* Row 2 */}
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Total Money" value={getCardValue(data?.totalMoney)} subValue={getCardSubValue(data?.totalMoney)} icon={RawWalletIcon} tooltip={"The current total value of your account, representing the sum of your Principal State and your Growth State.\n\nFormula: Principal State + Growth State"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Weighted ADR" value={data ? `${formatVal(data.weightedAdr)}%` : "--%"} subValue={null} icon={RawActivityIcon} tooltip={"Weighted Average Daily Range (20 days) across all positions, proportional to their market value allocation.\n\nFormula: ∑ [ (Position Value / Total Market Value) × ADR ]"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Money Allocated" value={getCardValue(data?.moneyAllocated)} subValue={getCardSubValue(data?.moneyAllocated)} icon={RawPieChartIcon} tooltip={"The total initial capital (cost basis) invested across all open positions.\n\nFormula: ∑ (Position Quantity × Average Cost)"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="emerald" title="Threshold Gains" value={getCardValue(data?.thresholdGains)} subValue={getCardSubValue(data?.thresholdGains)} icon={RawShieldCheckIcon} tooltip={`The portion of your unrealized profits that are "stable" because they are protected by either your current stop-loss levels or your MA${maPeriod} threshold.\n\nFormula: ∑ [abs(Exit Price - Entry Price) × Position Quantity]`} />
                            </div>

                            {/* Row 3 */}
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Principal State [PS]" value={getCardValue(data?.principalState)} subValue={getCardSubValue(data?.principalState)} icon={RawShieldIcon} tooltip={'The "real" value of your account — the money you truly own after subtracting open risk from your cash and allocated capital.\n\nFormula: (Cash + Money Allocated) - Open Risk'} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Cash" value={getCardValue(data?.cash)} subValue={getCardSubValue(data?.cash)} icon={RawBanknoteIcon} tooltip={'Total settled and unsettled cash available in the account.\n\nFormula: API Fetch (CashBalance)'} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="blue" title="Total Market's Money" value={getCardValue(data?.openRisk)} subValue={getCardSubValue(data?.openRisk)} icon={RawAlertIcon} tooltip={"The absolute maximum amount of money—whether it's your principal or unprotected profits—that the market can physically take back from you right now, assuming no drastic price gaps past your stops.\n\nFormula: ∑ [abs(Market Price - Exit Price) × Position Quantity]"} />
                            </div>
                            <div className="lg:col-span-1">
                                <StatCard color="emerald" title="Dynamic Gains" value={getCardValue(data?.dynamicGains)} subValue={getCardSubValue(data?.dynamicGains)} icon={RawZapIcon} tooltip={'The fluid portion of your profits that fluctuates with market volatility and has not yet been "locked in" by a protective stop.\n\nFormula: Growth State - Threshold Gains'} />
                            </div>
                        </section>

                        {/* Positions Table */}
                        <section>
                            <div className="bg-[#0f172a] border border-blue-900/20 rounded-2xl shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[900px]">
                                        <thead>
                                            <tr className="bg-blue-950/20 border-b border-blue-900/10">
                                                <th className="px-3 py-3 text-[10px] font-bold text-blue-50 uppercase text-center">Symbol</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">Pos</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">Avg Cost</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">Size</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">% of PS</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-blue-50 uppercase text-center">Price</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-amber-400/80 uppercase text-center">Stop</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-purple-400/80 uppercase text-center" title="Average Daily Range (20 days)">ADR</th>

                                                <th className={`px-3 py-3 text-[10px] font-bold uppercase text-center ${maPeriod === 10 ? 'text-cyan-400' : 'text-blue-400/40'}`}>MA10</th>
                                                <th className={`px-3 py-3 text-[10px] font-bold uppercase text-center ${maPeriod === 20 ? 'text-cyan-400' : 'text-blue-400/40'}`}>MA20</th>
                                                <th className="px-3 py-3 text-[10px] font-bold text-cyan-400 uppercase text-center">PnL</th>
                                                <th className="px-3 py-3 text-center">
                                                    <div className="relative group inline-flex items-center justify-center w-full gap-1.5 cursor-help">
                                                        <div className="absolute top-full mt-2 w-64 z-50 text-left hidden group-hover:block whitespace-normal font-normal opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                                Risk regarding the principal (Risk - PNL). Shows the portion of the whole risk that is the cost of the stop from the entry location.
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-bold text-orange-400/80 uppercase">Open Risk</span>
                                                        <RawInfoIcon className="w-3 h-3 text-orange-400/60 group-hover:text-orange-400 transition-colors" />
                                                    </div>
                                                </th>
                                                <th className="px-3 py-3 text-center">
                                                    <div className="relative group inline-flex items-center justify-center w-full gap-1.5 cursor-help">
                                                        <div className="absolute top-full mt-2 w-64 z-50 text-left hidden group-hover:block whitespace-normal font-normal opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                                The absolute maximum amount of money—whether it's your principal or unprotected profits—that the market can physically take back from you right now for this position, assuming no drastic price gaps past your stops.
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-bold text-blue-400/80 uppercase">Market's Money</span>
                                                        <RawInfoIcon className="w-3 h-3 text-blue-400/60 group-hover:text-blue-400 transition-colors" />
                                                    </div>
                                                </th>
                                                <th className="px-3 py-3 text-center">
                                                    <div className="relative group inline-flex items-center justify-center w-full gap-1.5 cursor-help">
                                                        <div className="absolute top-full mt-2 w-64 z-50 text-left hidden group-hover:block whitespace-normal font-normal opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <div className="bg-slate-900 border border-blue-700/40 text-blue-200/80 text-[11px] leading-relaxed p-3 rounded-xl shadow-2xl">
                                                                The backend logic chooses the tighter of your Stop Price and Moving Average (MA) as the effective exit point. It will only account for T-Gain if the stop price is moved in favor of the trade, protecting gains.
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase">T-Gain</span>
                                                        <RawInfoIcon className="w-3 h-3 text-slate-500 group-hover:text-blue-500 transition-colors" />
                                                    </div>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-blue-900/5 text-sm">
                                            {data && data.positions.map((pos) => (
                                                <tr key={pos.symbol} className="hover:bg-blue-900/10 transition-colors group">
                                                    <td className="px-3 py-4 font-bold text-blue-50 text-center">{pos.symbol}</td>
                                                    <td className="px-3 py-4 text-center text-slate-500">{isPrivacyMode ? "***" : pos.pos.toLocaleString('en-US')}</td>
                                                    <td className="px-3 py-4 text-center text-slate-500">${formatVal(pos.avgCost)}</td>
                                                    <td className="px-3 py-4 text-center text-slate-500">{isPrivacyMode ? "***" : `$${formatVal(Math.abs(pos.pos * pos.avgCost))}`}</td>
                                                    <td className="px-3 py-4 text-center text-slate-500">{data.principalState ? (Math.abs(pos.pos * pos.avgCost) / data.principalState * 100).toFixed(2) + '%' : '--'}</td>
                                                    <td className="px-3 py-4 text-center text-blue-50">${formatVal(pos.price)}</td>
                                                    <td className="px-3 py-4 text-center font-mono">
                                                        {pos.stop ? (
                                                            <span className="text-amber-400/80">${formatVal(pos.stop)}</span>
                                                        ) : (
                                                            <span className="text-cyan-400/80 font-semibold" title={`Using MA${maPeriod} as fallback stop`}>MA{maPeriod}</span>
                                                        )}
                                                    </td>
                                                    <td className="px-3 py-4 text-center font-mono text-purple-400/80">{pos.adr ? `${formatVal(pos.adr)}%` : '--'}</td>

                                                    <td className={`px-3 py-4 text-center font-mono ${maPeriod === 10 ? 'text-cyan-400 font-semibold' : 'text-blue-400/40'}`}>{pos.ma10 ? `$${formatVal(pos.ma10)}` : '--'}</td>
                                                    <td className={`px-3 py-4 text-center font-mono ${maPeriod === 20 ? 'text-cyan-400 font-semibold' : 'text-blue-400/40'}`}>{pos.ma20 ? `$${formatVal(pos.ma20)}` : '--'}</td>
                                                    <td className={`px-3 py-4 text-center font-semibold ${pos.pnl > 0 ? 'text-cyan-400' : 'text-blue-400/60'}`}>
                                                        {isPrivacyMode ? "***" : `$${formatVal(pos.pnl)}`}
                                                    </td>
                                                    <td className="px-3 py-4 text-center font-bold text-orange-400/80">{isPrivacyMode ? "***" : `$${formatVal(pos.psRisk)}`}</td>
                                                    <td className="px-3 py-4 text-center font-bold text-blue-400/80">{isPrivacyMode ? "***" : `$${formatVal(pos.risk)}`}</td>
                                                    <td className="px-3 py-4 text-center text-slate-500">{isPrivacyMode ? "***" : `$${formatVal(pos.tGain)}`}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {!data && <div className="p-12 text-center text-blue-900 font-bold uppercase tracking-widest">No Active Connection</div>}
                                </div>
                            </div>
                        </section>

                        {/* Position Chart */}
                        <PositionChart data={data} isPrivacyMode={isPrivacyMode} />

                        {/* FAQ Section */}
                        <section className="mt-8">
                            <div className="bg-[#0f172a] border border-blue-900/20 rounded-2xl overflow-hidden shadow-2xl p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <RawInfoIcon className="w-5 h-5 text-blue-400" />
                                    <h2 className="text-lg font-semibold text-blue-50">FAQ</h2>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-blue-950/20 border border-blue-900/20 p-5 rounded-xl">
                                        <h3 className="font-semibold text-blue-100 mb-2">What Total Market's Money Actually Is?</h3>
                                        <p className="text-sm text-slate-400 mb-3">
                                            If every single one of your active positions immediately dropped and triggered your stop price (or fell to your Moving Average fallback), your total account balance would drop by the exact amount shown in the Total Market's Money box.
                                        </p>
                                        <p className="text-sm text-slate-400 mb-3">
                                            Your Total Market's Money is a combination of two things:
                                        </p>
                                        <ul className="text-sm text-slate-400 space-y-2 list-decimal pl-5 marker:text-blue-500/50">
                                            <li>
                                                <strong className="text-blue-300 font-medium">Sinking Principal (The Bad Risk, or Open Risk):</strong> If you enter a trade and it immediately goes against you, the difference between your Current Price and the Stop Loss represents original capital (your own money) that you are risking.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">Dynamic Gains (The Fluid Profit Risk):</strong> If you are in a winning trade but you haven't moved your stop up to protect that profit yet, the difference between the Current Price and the Stop Loss represents "The Market's Money" that you are currently floating. You haven't locked it in, so it's technically at risk of being given back.
                                            </li>
                                        </ul>
                                        <p className="text-sm text-slate-400 mt-3 italic">
                                            Total Market's Money combines these two numbers across your entire portfolio. It is the absolute maximum amount of money—whether it's your principal or unprotected profits—that the market can physically take back from you right now, assuming no drastic price gaps past your stops.
                                        </p>
                                    </div>
                                    <div className="bg-blue-950/20 border border-blue-900/20 p-5 rounded-xl">
                                        <h3 className="font-semibold text-blue-100 mb-2">What is the purpose of the Risk Coverage Ratio?</h3>
                                        <p className="text-sm text-slate-400 mb-3">
                                            The Risk Coverage Ratio tells you what percentage of your secured profits you are currently risking in the market. It shows the relationship between your true Open Risk (Principal State Risk) and your Threshold Gains.
                                        </p>
                                        <ul className="text-sm text-slate-400 space-y-2 list-disc pl-5 marker:text-blue-500/50">
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is low (e.g., &lt; 50% "Safe/Caution"):</strong> You are risking a fraction of your protected profits. Even if all your current risks were realized (hit your stops), you would still be left with a net positive gain from your protected positions.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is 100% ("Defense"):</strong> You are risking exactly as much as you have secured. Your "Safety Buffer" is $0.
                                            </li>
                                            <li>
                                                <strong className="text-blue-300 font-medium">If the ratio is &gt; 100%:</strong> You are risking more than your current protected profits. This means if all your stops were hit, your recent protected gains wouldn't be enough to cover the losses, and it would eat into your principal.
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
